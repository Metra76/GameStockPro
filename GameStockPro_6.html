const LS_KEY="gsp_v3";
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e){return null;}
}
function saveState(state){
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}
}

/* ═══════════════════════ REDUCER ══════════════════════════════════════ */
function reducer(state,action){
  let next;
  switch(action.type){
    case "ADD_PRODUCT":
      next={...state,products:[...state.products,{...action.payload,id:Date.now(),ebayData:null,priceHistory:[]}]};break;
    case "UPDATE_PRODUCT":
      next={...state,products:state.products.map(p=>p.id===action.payload.id?action.payload:p)};break;
    case "DELETE_PRODUCT":
      next={...state,products:state.products.filter(p=>p.id!==action.payload)};break;
    case "UPDATE_EBAY":{
      const {id,ebayData}=action.payload;
      const ts=new Date().toISOString().split("T")[0];
      const products=state.products.map(p=>{
        if(p.id!==id) return p;
        const ph=[...(p.priceHistory||[])];
        if(ebayData.mediana>0){
          const last=ph[ph.length-1];
          if(!last||last.date!==ts) ph.push({date:ts,price:ebayData.mediana});
          else ph[ph.length-1]={date:ts,price:ebayData.mediana};
        }
        return {...p,ebayData,valorMercado:ebayData.mediana>0?ebayData.mediana:p.valorMercado,priceHistory:ph};
      });
      next={...state,products};break;
    }
    case "ADD_MOVEMENT":{
      const {productoId,tipo,cantidad}=action.payload;
      const products=state.products.map(p=>{
        if(p.id===productoId){const delta=tipo==="Venta"||tipo==="Salida"?-cantidad:cantidad;return{...p,stock:Math.max(0,p.stock+delta)};}
        return p;
      });
      next={...state,products,movements:[{...action.payload,id:Date.now()},...state.movements]};break;
    }
    case "ADD_RESERVA":
      next={...state,reservas:[...state.reservas,{...action.payload,id:Date.now()}]};break;
    case "UPDATE_RESERVA":
      next={...state,reservas:state.reservas.map(r=>r.id===action.payload.id?action.payload:r)};break;
    case "DELETE_RESERVA":
      next={...state,reservas:state.reservas.filter(r=>r.id!==action.payload)};break;
    case "MARK_NEWS_SEEN":
      next={...state,seenNews:[...new Set([...(state.seenNews||[]),action.payload])]};break;
    default: return state;
  }
  saveState(next);
  return next;
}

/* Gráfica SVG de historial de precios */
function PriceChart({history,color="#7c3aed"}){
  if(!history||history.length<2) return(
    <div style={{textAlign:"center",padding:"24px 0",color:"#9ca3af",fontSize:12}}>Sin suficientes datos de historial</div>
  );
  const W=320,H=90,pad=6;
  const prices=history.map(h=>h.price);
  const min=Math.min(...prices);
  const max=Math.max(...prices);
  const range=max-min||1;
  const pts=history.map((h,i)=>{
    const x=pad+(i/(history.length-1))*(W-pad*2);
    const y=H-pad-(h.price-min)/range*(H-pad*2);
    return [x,y];
  });
  const path="M"+pts.map(p=>p.join(",")).join(" L");
  const areaPath=path+` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
        <defs>
          <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={areaPath} fill="url(#pg)"/>
        <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color}/>
        ))}
        <text x={pts[0][0]} y={H-1} fontSize="8" fill="#9ca3af" textAnchor="start">{history[0].date.slice(5)}</text>
        <text x={pts[pts.length-1][0]} y={H-1} fontSize="8" fill="#9ca3af" textAnchor="end">{history[history.length-1].date.slice(5)}</text>
        <text x={W-2} y={pts[pts.length-1][1]-4} fontSize="9" fill={color} textAnchor="end" fontWeight="700">{fmt(prices[prices.length-1])}€</text>
      </svg>
    </div>
  );
}

/* Buscador integrado */
function GameSearcher({onSelect,onClose}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(q.length<3){setResults([]);return;}
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      setLoading(true);setError(null);
      try{
        const r=await fetch(`${WORKER}/search?q=${encodeURIComponent(q)}`);
        if(!r.ok) throw new Error("Error en búsqueda");
        const data=await r.json();
        setResults((data||[]).map(g=>({
          nombre: g.name||g.nombre||"",
          plataforma: (g.platforms&&g.platforms[0])?g.platforms[0].name:(g.plataforma||""),
          año: g.first_release_date?new Date(g.first_release_date*1000).getFullYear():(g.año||""),
          sku: g.id||""
        })));
      }catch(e){setError("Error al buscar. Comprueba conexión.");setResults([]);}
      finally{setLoading(false);}
    },500);
    return()=>clearTimeout(timerRef.current);
  },[q]);

  return(
    <Sheet onClose={onClose} title="🔍 Buscar juego">
      <Field label="Nombre del juego">
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)}
          placeholder="Ej: Silent Hill 2 Collector..." style={S.inp()}/>
      </Field>
      {loading&&<div style={{textAlign:"center",padding:16,color:"#7c3aed",fontSize:13}}>
        <span className="spin" style={{display:"inline-block"}}>⚙️</span> Buscando…
      </div>}
      {error&&<div style={{padding:10,background:"#fee2e2",borderRadius:8,color:"#dc2626",fontSize:12,marginBottom:8}}>{error}</div>}
      {results.length>0&&(
        <div style={{border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",maxHeight:340,overflowY:"auto"}}>
          {results.map((r,i)=>(
            <button key={i} onClick={()=>onSelect(r)}
              style={{...S.row,flexDirection:"column",alignItems:"flex-start",gap:2,padding:"12px 14px"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{fontWeight:700,fontSize:13}}>{r.nombre}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{r.plataforma||r.categoria||""} {r.año?`· ${r.año}`:""}</div>
            </button>
          ))}
        </div>
      )}
      {q.length>=3&&!loading&&results.length===0&&!error&&(
        <div style={{padding:20,textAlign:"center",color:"#9ca3af",fontSize:13}}>Sin resultados para "{q}"</div>
      )}
    </Sheet>
  );
}

/* ═══════════════════════ MAIN APP ═════════════════════════════════════ */
function App(){
  const [state,dispatch]=useReducer(reducer,null,getInitialState);
  const [nav,setNav]=useState({screen:"home",data:null});
  const [tab,setTab]=useState("home"); // bottom nav: home|stock|radar|reservas
  const [modal,setModal]=useState(null);
  const [formP,setFormP]=useState(EMPTY_P);
  const [formR,setFormR]=useState(EMPTY_R);
  const [editId,setEditId]=useState(null);
  const [movForm,setMovForm]=useState({productoId:"",tipo:"Venta",cantidad:1,nota:"",precioVenta:"",fecha:today,ebayFee:""});
  const [toast,setToast]=useState(null);
  const [priv,setPriv]=useState(false);
  const [search,setSearch]=useState("");
  const [updateProgress,setUpdateProgress]=useState(null); // {current,total}
  const [loadingEbay,setLoadingEbay]=useState(null); // product id being fetched
  const [radarNews,setRadarNews]=useState([]);
  const [radarLoading,setRadarLoading]=useState(false);
  const [worthData,setWorthData]=useState({});
  const [radarFilter,setRadarFilter]=useState("Todas");


  const H=v=>priv?HIDDEN:v;
  const go=(screen,data=null)=>{setSearch("");setNav({screen,data});};
  const showToast=(msg,c="#16a34a")=>{setToast({msg,c});setTimeout(()=>setToast(null),2800);};

  /* Sync tab with screen */
  useEffect(()=>{
    if(tab==="home") go("home");
    if(tab==="stock") go("stock");
    if(tab==="radar") go("radar");
    if(tab==="reservas") go("reservas");
  },[tab]);

  const ventas=state.movements.filter(m=>m.tipo==="Venta");
  const reservasOrd=useMemo(()=>[...state.reservas]
    .sort((a,b)=>a.lanzamiento.localeCompare(b.lanzamiento)),[state.reservas]);
  const reservasActivas=useMemo(()=>reservasOrd.filter(r=>diasHasta(r.lanzamiento)>=-7),[reservasOrd]);
  const reservasPasadas=useMemo(()=>reservasOrd.filter(r=>diasHasta(r.lanzamiento)<-7),[reservasOrd]);

  const kpi=useMemo(()=>{
    const inv=state.products.reduce((a,p)=>a+p.stock*p.precioCompra,0);
    const vm=state.products.reduce((a,p)=>a+p.stock*(p.valorMercado||p.precioCompra),0);
    const ing=ventas.reduce((a,m)=>a+(m.precioVenta||0)*m.cantidad,0);
    const cv=ventas.reduce((a,m)=>a+(m.historico?m.coste:0)*m.cantidad,0);
    const ben=ing-cv;
    const roi=cv>0?ben/cv*100:0;
    return{inv,vm,ing,ben,roi,margen:ing>0?ben/ing*100:0,stock:state.products.reduce((a,p)=>a+p.stock,0)};
  },[state,ventas]);

  const catStats=useMemo(()=>Object.keys(CAT_CONFIG).map(cat=>{
    const prods=state.products.filter(p=>p.categoria===cat);
    const vCat=ventas.filter(m=>(m.historico?m.categoriaVenta:(state.products.find(p=>p.id===m.productoId)?.categoria||""))===cat);
    const ing=vCat.reduce((a,m)=>a+(m.precioVenta||0)*m.cantidad,0);
    const cv=vCat.reduce((a,m)=>a+(m.historico?m.coste:0)*m.cantidad,0);
    return{cat,refs:prods.length,uds:prods.reduce((a,p)=>a+p.stock,0),
      inv:prods.reduce((a,p)=>a+p.stock*p.precioCompra,0),
      vm:prods.reduce((a,p)=>a+p.stock*(p.valorMercado||p.precioCompra),0),
      ing,ben:ing-cv,nVentas:vCat.length};
  }),[state,ventas]);

  const oportunidades=useMemo(()=>
    state.products.filter(p=>p.valorMercado>0&&p.valorMercado>p.precioCompra*1.5&&p.stock>0)
      .sort((a,b)=>(b.valorMercado-b.precioCompra)-(a.valorMercado-a.precioCompra)),
  [state.products]);

  const catProducts=useMemo(()=>{
    if(nav.screen!=="categoria") return [];
    return state.products.filter(p=>p.categoria===nav.data&&
      (!search||p.nombre.toLowerCase().includes(search.toLowerCase())||p.sku.toLowerCase().includes(search.toLowerCase())));
  },[nav,state.products,search]);

  /* ── eBay price fetch ── */
  const fetchEbayPrice=useCallback(async(product)=>{
    setLoadingEbay(product.id);
    try{
      const r=await fetch(`${WORKER}/price?q=${encodeURIComponent(product.nombre)}&cat=${encodeURIComponent(product.categoria)}`);
      if(!r.ok) throw new Error("Error eBay");
      const data=await r.json();
      dispatch({type:"UPDATE_EBAY",payload:{id:product.id,ebayData:{mediana:data.mediana||0,min:data.min||0,max:data.max||0,count:data.count||0,fetchedAt:new Date().toISOString()}}});
      showToast(`✓ Precio eBay: ${fmt(data.mediana||0)} €`);
    }catch(e){showToast("Error al obtener precio eBay","#dc2626");}
    finally{setLoadingEbay(null);}
  },[]);

  /* ── Auto update all prices ── */
  const updateAllPrices=useCallback(async()=>{
    const withStock=state.products.filter(p=>p.stock>0);
    setUpdateProgress({current:0,total:withStock.length});
    for(let i=0;i<withStock.length;i++){
      const p=withStock[i];
      try{
        const r=await fetch(`${WORKER}/price?q=${encodeURIComponent(p.nombre)}&cat=${encodeURIComponent(p.categoria)}`);
        if(r.ok){
          const data=await r.json();
          if(data.mediana>0) dispatch({type:"UPDATE_EBAY",payload:{id:p.id,ebayData:{mediana:data.mediana,min:data.min||0,max:data.max||0,count:data.count||0,fetchedAt:new Date().toISOString()}}});
        }
      }catch(e){}
      setUpdateProgress({current:i+1,total:withStock.length});
      await new Promise(res=>setTimeout(res,300));
    }
    setUpdateProgress(null);
    showToast(`✓ ${withStock.length} precios actualizados`);
  },[state.products]);

  /* ── Radar news fetch ── */
  const fetchRadarNews=useCallback(async()=>{
    setRadarLoading(true);
    try{
      const r=await fetch(`${WORKER}/radar/news`);
      if(!r.ok) throw new Error();
      const data=await r.json();
      setRadarNews((data||[]).map((n,i)=>({
        id: n.id||n.link||String(i),
        titulo: n.title||n.titulo||"",
        fecha: n.date||n.fecha||"",
        fuente: n.source||n.fuente||"",
        link: n.link||""
      })));
    }catch(e){
      setRadarNews([]);
    }
    setRadarLoading(false);
  },[]);

  const fetchWorth=useCallback(async(noticia)=>{
    const id=noticia.id;
    setWorthData(prev=>({...prev,[id]:{loading:true,result:null}}));
    try{
      const q=encodeURIComponent(noticia.titulo.slice(0,80));
      const r=await fetch(`${WORKER}/radar/worth?q=${q}&precio=0`);
      if(!r.ok) throw new Error();
      const data=await r.json();
      setWorthData(prev=>({...prev,[id]:{loading:false,result:data}}));
    }catch(e){
      setWorthData(prev=>({...prev,[id]:{loading:false,result:null}}));
    }
  },[]);

  useEffect(()=>{if(tab==="radar") fetchRadarNews();},[tab]);

  /* ── Handlers ── */
  const saveP=()=>{
    if(!formP.nombre.trim()) return;
    const p={...formP,stock:+formP.stock,precioCompra:+formP.precioCompra,valorMercado:+formP.valorMercado};
    if(modal==="edit"){dispatch({type:"UPDATE_PRODUCT",payload:{...p,id:editId}});showToast("✓ Actualizado");}
    else{dispatch({type:"ADD_PRODUCT",payload:p});showToast("✓ Añadido");}
    setModal(null);
  };
  const saveMov=()=>{
    if(!movForm.productoId||movForm.cantidad<1) return;
    dispatch({type:"ADD_MOVEMENT",payload:{...movForm,productoId:+movForm.productoId,cantidad:+movForm.cantidad,precioVenta:+movForm.precioVenta||0,ebayFee:+movForm.ebayFee||0,fecha:movForm.fecha||today}});
    showToast("✓ Registrado");setModal(null);
  };
  const saveR=()=>{
    if(!formR.nombre.trim()||!formR.lanzamiento) return;
    const r={...formR,precioReserva:+formR.precioReserva,unidades:+formR.unidades,costeTotal:+formR.costeTotal,costePendiente:+(formR.costePendiente||0),precioFinal:+(formR.precioFinal||0)};
    if(editId){dispatch({type:"UPDATE_RESERVA",payload:{...r,id:editId}});showToast("✓ Reserva actualizada");}
    else{dispatch({type:"ADD_RESERVA",payload:r});showToast("✓ Reserva añadida");}
    setModal(null);setFormR(EMPTY_R);setEditId(null);
  };
  const exportCSV=()=>{
    const h=["SKU","Categoría","Nombre","Stock","Condición","Fecha Compra","Coste","Valor Mercado","eBay Mediana","eBay Min","eBay Max"];
    const r=state.products.map(p=>[p.sku,p.categoria,`"${p.nombre}"`,p.stock,p.condicion||"Precintado",p.fechaCompra||"",p.precioCompra,p.valorMercado,p.ebayData?.mediana||"",p.ebayData?.min||"",p.ebayData?.max||""]);
    const blob=new Blob(["\uFEFF",[h,...r].map(x=>x.join(";")).join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`stockpro_${today}.csv`;a.click();
    showToast("✓ CSV exportado");
  };

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`stockpro_backup_${today}.json`;a.click();
    showToast("✓ Backup exportado");
  };

  const importJSON=()=>{
    const input=document.createElement("input");
    input.type="file";input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(!data.products||!data.movements) throw new Error("Formato inválido");
          localStorage.setItem("gsp_v3",JSON.stringify(data));
          showToast("✓ Backup restaurado — recarga la página","#7c3aed");
          setTimeout(()=>window.location.reload(),1500);
        }catch(err){showToast("Error al importar backup","#dc2626");}
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const {screen,data}=nav;
  const catCfg=screen==="categoria"?CAT_CONFIG[data]||{}:{};
  const catStat=screen==="categoria"?catStats.find(c=>c.cat===data)||{}:{};
  const sinVM=screen==="categoria"?catProducts.filter(p=>!p.valorMercado||p.valorMercado===0).length:0;
  const pFresh=screen==="producto"?state.products.find(x=>x.id===data?.id)||data:null;
  const pCfg=pFresh?CAT_CONFIG[pFresh.categoria]||{}:{};
  const pPlusval=pFresh&&pFresh.precioCompra>0&&pFresh.valorMercado>0?((pFresh.valorMercado-pFresh.precioCompra)/pFresh.precioCompra*100):null;
  const pVentas=pFresh?ventas.filter(m=>m.nombreProducto===pFresh.nombre||(m.productoId===pFresh.id)):[];
  const vData=screen==="ventaDetalle"?data:null;
  const vProd=vData?state.products.find(p=>p.id===vData.productoId):null;
  const vNombre=vData?(vData.historico?vData.nombreProducto:(vProd?.nombre||"—")):"";
  const vCat=vData?(vData.historico?vData.categoriaVenta:(vProd?.categoria||"—")):"";
  const vCoste=vData?(vData.historico?vData.coste:(vProd?.precioCompra||0)):0;
  const vFee=vData?(vData.ebayFee||0):0;
  const vBen=vData?((vData.precioVenta-vCoste)*vData.cantidad-vFee):0;
  const vCfg=vData?(CAT_CONFIG[vCat]||{}):{};
  const rFresh=screen==="reservaDetalle"?state.reservas.find(x=>x.id===data?.id)||data:null;
  const rCfg=rFresh?CAT_CONFIG[rFresh.plataforma]||{}:{};
  const rDias=rFresh?diasHasta(rFresh.lanzamiento):0;
  const rUrg=rFresh?(rDias<=30?"#dc2626":rDias<=90?"#d97706":"#16a34a"):"#16a34a";

  /* ───────────────────── RENDER ────────────────────────── */
  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"system-ui,-apple-system,sans-serif",fontSize:14,color:"#111827",paddingBottom:70}}>

      {/* TOAST */}
      {toast&&<div className="fade-in" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.c,color:"#fff",padding:"10px 22px",borderRadius:30,fontWeight:700,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.2)",fontSize:13,whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {/* HEADER */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {screen!=="home"&&screen!=="stock"&&screen!=="radar"&&screen!=="reservas"&&
            <button onClick={()=>{
              if(screen==="producto"||screen==="categoria"||screen==="grupo") setTab("stock");
              else if(screen==="reservaDetalle") setTab("reservas");
              else if(screen==="oportunidades"||screen==="ventas"||screen==="ventaDetalle") go("home");
              else setTab("home");
            }} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",display:"flex",alignItems:"center",gap:4}}>← Atrás</button>
          }
          {(screen==="home"||screen==="stock"||screen==="radar"||screen==="reservas")&&
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:30,height:30,background:"linear-gradient(135deg,#7c3aed,#a78bfa)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🎮</div>
              <span style={{fontWeight:800,fontSize:15,letterSpacing:"-0.3px"}}>StockPro</span>
            </div>
          }
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setPriv(p=>!p)} style={{background:priv?"#fef9c3":"#f3f4f6",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:priv?"#854d0e":"#6b7280",fontWeight:600}}>{priv?"🔒":"👁"}</button>
          {(screen==="home"||screen==="stock")&&<>
            <button onClick={()=>{setMovForm({productoId:state.products[0]?.id||"",tipo:"Venta",cantidad:1,nota:"",precioVenta:""});setModal("mov");}} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:"#374151",fontWeight:600}}>🔄</button>
            <button onClick={()=>setModal("search")} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,fontWeight:600}}>🔍</button>
            <button onClick={()=>{setFormP(EMPTY_P);setEditId(null);setModal("add");}} style={{background:"#7c3aed",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,color:"#fff",fontWeight:700}}>＋</button>
          </>}
          {screen==="stock"&&<button onClick={updateAllPrices} disabled={!!updateProgress} style={{background:updateProgress?"#e9d5ff":"#ede9fe",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12,color:"#7c3aed",fontWeight:700}}>⚡</button>}
        </div>
      </div>

      <div style={{padding:"14px 14px 8px",maxWidth:640,margin:"0 auto"}}>

        {/* ── UPDATE PROGRESS ── */}
        {updateProgress&&<UpdateProgress current={updateProgress.current} total={updateProgress.total}/>}

        {/* ══════════════════════════ HOME ══════════════════════════════ */}
        {screen==="home"&&<div className="fade-in">
          {/* KPIs 2x2 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {[
              {l:"Invertido",v:H(`${fmt(kpi.inv)} €`),sub:`${kpi.stock} uds`,icon:"💶",c:"#7c3aed"},
              {l:"Valor mercado",v:H(`${fmt(kpi.vm)} €`),sub:!priv&&kpi.vm>kpi.inv?`+${fmt(kpi.vm-kpi.inv)} €`:"",icon:"💎",c:"#2563eb"},
              {l:"Beneficio",v:H(`${kpi.ben>=0?"+":""}${fmt(kpi.ben)} €`),sub:`${ventas.length} ventas`,icon:"📈",c:kpi.ben>=0?"#16a34a":"#dc2626"},
              {l:"Ingresos",v:H(`${fmt(kpi.ing)} €`),sub:!priv&&kpi.ing>0?`${kpi.margen.toFixed(1)}% margen`:"",icon:"💸",c:"#0891b2"},
            ].map((k,i)=>(
              <div key={i} style={{...S.card,padding:"14px 15px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:10,color:"#9ca3af",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{k.l}</span>
                  <span>{k.icon}</span>
                </div>
                <div style={{fontSize:18,fontWeight:800,color:k.c,letterSpacing:priv?3:-0.3}}>{k.v}</div>
                {k.sub&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{k.sub}</div>}
              </div>
            ))}
          </div>

          {/* Dashboard financiero */}
          <div style={{...S.card,padding:"14px 16px",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>📊 Dashboard financiero</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                {l:"ROI ventas",v:H(`${kpi.roi>=0?"+":""}${fmt(kpi.roi)}%`),c:kpi.roi>=0?"#16a34a":"#dc2626"},
                {l:"Plus-valía",v:H(`+${fmt(kpi.vm-kpi.inv)} €`),c:kpi.vm>kpi.inv?"#7c3aed":"#dc2626"},
                {l:"Multiplicador",v:H(`×${kpi.inv>0?(kpi.vm/kpi.inv).toFixed(2):"∞"}`),c:"#d97706"},
              ].map((k,i)=>(
                <div key={i} style={{background:"#f9fafb",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#9ca3af",fontWeight:700,textTransform:"uppercase",letterSpacing:.3,marginBottom:4}}>{k.l}</div>
                  <div style={{fontSize:14,fontWeight:800,color:k.c}}>{k.v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Grupos inventario */}
          {(()=>{
            const hasAny=GRUPOS.some(g=>catStats.some(c=>g.cats.includes(c.cat)&&c.uds>0));
            if(!hasAny) return null;
            return(
              <div style={{...S.card,marginBottom:10,overflow:"hidden"}}>
                <div style={{padding:"12px 14px",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,fontSize:13}}>📦 Inventario</span>
                  <button onClick={()=>setTab("stock")} style={{background:"none",border:"none",color:"#7c3aed",fontSize:12,cursor:"pointer",fontWeight:600}}>Ver stock →</button>
                </div>
                {GRUPOS.map(grupo=>{
                  const items=catStats.filter(c=>grupo.cats.includes(c.cat)&&c.uds>0);
                  if(!items.length) return null;
                  const gVM=items.reduce((a,c)=>a+c.vm,0);
                  const gUds=items.reduce((a,c)=>a+c.uds,0);
                  const gRefs=items.reduce((a,c)=>a+c.refs,0);
                  return(
                    <button key={grupo.key} onClick={()=>{setTab("stock");go("grupo",grupo);}} style={{...S.row}}
                      onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{width:36,height:36,background:"#f3f4f6",border:"1px solid #e5e7eb",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{grupo.emoji}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13}}>{grupo.label}</div>
                        <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>{gRefs} refs · {gUds} uds</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:13,fontWeight:700,color:grupo.color}}>{H(`${fmt(gVM)} €`)}</div>

        ))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Categoría"><select value={formP.categoria} onChange={e=>setFormP({...formP,categoria:e.target.value})} style={S.inp()}>{CATEGORIES_FULL.map(c=><option key={c}>{c}</option>)}</select></Field>
          <Field label="Condición"><select value={formP.condicion||"Precintado"} onChange={e=>setFormP({...formP,condicion:e.target.value})} style={S.inp()}><option>Precintado</option><option>CIB</option><option>Loose</option></select></Field>
        </div>
        <Field label="Fecha de compra"><input type="date" value={formP.fechaCompra||""} onChange={e=>setFormP({...formP,fechaCompra:e.target.value})} style={S.inp()}/></Field>
        <Btns onCancel={()=>setModal(null)} onSave={saveP}/>
      </Sheet>}

      {modal==="mov"&&<Sheet onClose={()=>setModal(null)} title="🔄 Registrar movimiento">
        <Field label="Producto"><select value={movForm.productoId} onChange={e=>setMovForm({...movForm,productoId:e.target.value})} style={S.inp()}>{state.products.map(p=><option key={p.id} value={p.id}>{p.nombre} ({p.categoria}) · {p.stock} uds</option>)}</select></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Tipo"><select value={movForm.tipo} onChange={e=>setMovForm({...movForm,tipo:e.target.value})} style={S.inp()}><option>Venta</option><option>Entrada</option><option>Salida</option></select></Field>
          <Field label="Cantidad"><input type="number" min={1} value={movForm.cantidad} onChange={e=>setMovForm({...movForm,cantidad:e.target.value})} style={S.inp()}/></Field>
        </div>
        {movForm.tipo==="Venta"&&<Field label="Precio venta (€)"><input type="number" min={0} step={0.01} value={movForm.precioVenta} onChange={e=>setMovForm({...movForm,precioVenta:e.target.value})} style={S.inp()} placeholder="0.00"/></Field>}
        {movForm.tipo==="Venta"&&<Field label="Comisión eBay (€)"><input type="number" min={0} step={0.01} value={movForm.ebayFee} onChange={e=>setMovForm({...movForm,ebayFee:e.target.value})} style={S.inp()} placeholder="0.00 (opcional)"/></Field>}
        <Field label="Plataforma / nota"><input type="text" value={movForm.nota} onChange={e=>setMovForm({...movForm,nota:e.target.value})} placeholder="eBay, Wallapop…" style={S.inp()}/></Field>
        <Field label="Fecha de venta"><input type="date" value={movForm.fecha||today} onChange={e=>setMovForm({...movForm,fecha:e.target.value})} style={S.inp()}/></Field>
        <Btns onCancel={()=>setModal(null)} onSave={saveMov} saveLabel="Registrar" saveColor="#16a34a"/>
      </Sheet>}

      {modal==="reserva"&&<Sheet onClose={()=>{setModal(null);setEditId(null);setFormR(EMPTY_R);}} title={editId?"✏️ Editar reserva":"🔖 Nueva reserva"}>
        <Field label="Nombre"><input type="text" value={formR.nombre} onChange={e=>setFormR({...formR,nombre:e.target.value})} style={S.inp()} onFocus={e=>e.target.style.borderColor="#7c3aed"} onBlur={e=>e.target.style.borderColor="#e5e7eb"}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Plataforma"><select value={formR.plataforma} onChange={e=>setFormR({...formR,plataforma:e.target.value})} style={S.inp()}>{PLATAFORMAS.map(p=><option key={p}>{p}</option>)}</select></Field>
          <Field label="Lanzamiento"><input type="date" value={formR.lanzamiento} onChange={e=>setFormR({...formR,lanzamiento:e.target.value})} style={S.inp()}/></Field>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Unidades"><input type="number" min={0} value={formR.unidades||0} onChange={e=>setFormR({...formR,unidades:e.target.value})} style={S.inp()}/></Field>
          <Field label="Señal pagada (€)"><input type="number" min={0} step={0.01} value={formR.costeTotal||0} onChange={e=>setFormR({...formR,costeTotal:e.target.value})} style={S.inp()}/></Field>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Pendiente (€)"><input type="number" min={0} step={0.01} value={formR.costePendiente||0} onChange={e=>setFormR({...formR,costePendiente:e.target.value})} style={S.inp()}/></Field>
          <Field label="Precio final ud (€)"><input type="number" min={0} step={0.01} value={formR.precioFinal||0} onChange={e=>setFormR({...formR,precioFinal:e.target.value})} style={S.inp()} placeholder="Precio total por unidad"/></Field>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
          <Field label="Tienda"><input type="text" value={formR.tienda} onChange={e=>setFormR({...formR,tienda:e.target.value})} placeholder="Amazon, GAME…" style={S.inp()}/></Field>
          <Field label="URL tienda"><input type="text" value={formR.urlTienda||""} onChange={e=>setFormR({...formR,urlTienda:e.target.value})} placeholder="https://…" style={S.inp()}/></Field>
        </div>
        <Field label="Notas"><input type="text" value={formR.notas} onChange={e=>setFormR({...formR,notas:e.target.value})} placeholder="Detalles…" style={S.inp()}/></Field>
        <Btns onCancel={()=>{setModal(null);setEditId(null);setFormR(EMPTY_R);}} onSave={saveR}/>
      </Sheet>}

      {modal==="search"&&<GameSearcher
        onClose={()=>setModal(null)}
        onSelect={(result)=>{
          setFormP({...EMPTY_P,nombre:result.nombre,categoria:result.plataforma||"PS5",sku:result.sku||""});
          setEditId(null);
          setModal("add");
        }}
      />}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

/* ── PWA Service Worker ── */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
