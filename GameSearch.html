<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameStockPro – Buscador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --gold: #f5c842;
    --text: #e8eaf0;
    --muted: #5a6080;
    --green: #3ddc84;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* Search bar */
  .search-wrap {
    padding: 20px 16px 12px;
    max-width: 600px;
    margin: 0 auto;
  }
  .search-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 4px 4px 16px;
    align-items: center;
    transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    padding: 10px 0;
  }
  .search-box input::placeholder { color: var(--muted); }
  .btn-search {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: .85; }
  .btn-search:disabled { opacity: .4; cursor: default; }

  .platform-filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 4px;
    max-width: 600px;
    margin: 0 auto;
    scrollbar-width: none;
  }
  .platform-filters::-webkit-scrollbar { display: none; }
  .pf-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    transition: all .15s;
    flex-shrink: 0;
  }
  .pf-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Results */
  .results-wrap {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity .15s;
  }
  .game-card:hover { border-color: var(--accent); background: var(--surface2); }
  .game-card:hover::before { opacity: 1; }

  .game-cover {
    width: 56px;
    height: 74px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .game-cover-placeholder {
    width: 56px;
    height: 74px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .game-info { flex: 1; min-width: 0; }
  .game-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .game-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.platform { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,.1); }
  .badge.year { color: var(--gold); border-color: var(--gold); background: rgba(245,200,66,.08); }

  .btn-select {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    transition: opacity .15s;
    margin-top: 4px;
  }
  .btn-select:hover { opacity: .85; }

  /* Estado vacío / loading */
  .state-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-box .icon { font-size: 48px; margin-bottom: 16px; }
  .state-box .title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); margin-bottom: 8px; }
  .state-box .sub { font-size: 13px; line-height: 1.6; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Panel de detalle / formulario */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .detail-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 48px;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .detail-hero {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .detail-cover {
    width: 80px; height: 105px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .detail-cover-placeholder {
    width: 80px; height: 105px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
  }
  .detail-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  /* Precio mercado */
  .price-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .price-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .price-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--green);
  }
  .price-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .price-loading { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .price-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    flex-shrink: 0;
  }

  /* Form fields */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border: none;
    color: #fff;
    padding: 15px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: opacity .15s;
    margin-top: 8px;
  }
  .btn-add:hover { opacity: .9; }

  .btn-cancel {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: border-color .15s;
  }
  .btn-cancel:hover { border-color: var(--muted); }

  /* Manual add button */
  .btn-manual {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--border);
    color: var(--muted);
    padding: 14px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-manual:hover { border-color: var(--accent); color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #0d0f14;
    padding: 10px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13px;
    z-index: 999;
    font-family: 'Syne', sans-serif;
    box-shadow: 0 4px 20px rgba(61,220,132,.3);
    animation: fadeInOut 2.6s forwards;
  }
  @keyframes fadeInOut {
    0% { opacity:0; transform:translateX(-50%) translateY(-8px); }
    10% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; }
    100% { opacity:0; }
  }

  /* Inventario añadido */
  .added-section { margin-top: 24px; }
  .added-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .added-cover {
    width: 40px; height: 52px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .added-name { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .added-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .added-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; color: var(--green); margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎮</div>
  <div>
    <div class="header-title">GameStockPro</div>
    <div class="header-sub">Buscador de juegos</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Busca un juego…" autocomplete="off" />
    <button class="btn-search" id="searchBtn" onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="platform-filters" id="platformFilters">
  <button class="pf-btn active" onclick="setPlatform(null,this)">Todos</button>
  <button class="pf-btn" onclick="setPlatform('PS5',this)">PS5</button>
  <button class="pf-btn" onclick="setPlatform('PS4',this)">PS4</button>
  <button class="pf-btn" onclick="setPlatform('Switch',this)">Switch</button>
  <button class="pf-btn" onclick="setPlatform('PC',this)">PC</button>
  <button class="pf-btn" onclick="setPlatform('Xbox',this)">Xbox</button>
</div>

<div class="results-wrap" id="resultsWrap">
  <div class="state-box">
    <div class="icon">🔍</div>
    <div class="title">Busca un juego</div>
    <div class="sub">Escribe el nombre y encuentra carátula, plataforma, año y precio de mercado estimado vía eBay.</div>
  </div>
</div>

<!-- Inventario añadido -->
<div class="results-wrap" id="addedWrap" style="display:none">
  <div class="added-section">
    <div class="section-label">✓ Añadidos esta sesión</div>
    <div id="addedList"></div>
  </div>
</div>

<!-- Botón añadir manual siempre visible tras una búsqueda -->
<div class="results-wrap" id="manualWrap" style="display:none">
  <button class="btn-manual" onclick="abrirManual()">＋ Añadir manualmente</button>
</div>

<!-- Detail sheet -->
<div class="detail-overlay" id="detailOverlay" style="display:none" onclick="cerrarDetalle(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-hero">
      <div id="detailCover"></div>
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="game-meta" id="detailMeta"></div>
      </div>
    </div>

    <div class="price-box">
      <div class="price-label">💰 Valor de mercado estimado (eBay)</div>
      <div id="priceContent"><div class="price-loading"><div class="price-spinner"></div> Consultando eBay…</div></div>
      <div class="price-sub" id="priceSub"></div>
    </div>

    <div class="field">
      <label>Nombre</label>
      <input type="text" id="fNombre" />
    </div>
    <div class="grid2">
      <div class="field">
        <label>Categoría</label>
        <select id="fCategoria">
          <option>PS5</option><option>PS4</option><option>Switch</option>
          <option>Switch 2</option><option>PC</option><option>Steelbook</option>
          <option>Cartas</option><option>Coleccionismo</option><option>Zapatillas</option><option>Mandos</option>
        </select>
      </div>
      <div class="field">
        <label>Condición</label>
        <select id="fCondicion">
          <option>Precintado</option><option>CIB</option><option>Loose</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Precio coste (€)</label>
        <input type="number" id="fCoste" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>Valor mercado (€)</label>
        <input type="number" id="fVM" step="0.01" placeholder="0.00" />
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Stock</label>
        <input type="number" id="fStock" value="1" min="1" />
      </div>
      <div class="field">
        <label>SKU</label>
        <input type="text" id="fSku" readonly style="opacity:.5" />
      </div>
    </div>

    <button class="btn-add" onclick="confirmarAdd()">＋ Añadir al inventario</button>
    <button class="btn-cancel" onclick="cerrarDetalle()">Cancelar</button>
  </div>
</div>

<script>
const API = 'https://gamestockpro-api.supremasos.workers.dev';

let selectedPlatform = null;
let currentGame = null;
let addedItems = [];
let skuCounters = {};

// ── Platform filter ──
function setPlatform(p, btn) {
  selectedPlatform = p;
  document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Search ──
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

async function buscar() {
  const q = searchInput.value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '…';

  setResults(`<div class="state-box"><div class="spinner"></div><div class="title">Buscando en IGDB…</div></div>`);

  let platformFilter = '';
  const igdbPlatforms = { 'PS5': 167, 'PS4': 48, 'Switch': 130, 'PC': 6, 'Xbox': 169 };
  if (selectedPlatform && igdbPlatforms[selectedPlatform]) {
    platformFilter = `& platforms = (${igdbPlatforms[selectedPlatform]})`;
  }

  try {
    const body = `fields name,cover.url,first_release_date,platforms.name,summary; search "${q}"; where version_parent = null ${platformFilter}; limit 12;`;
    const r = await fetch(`${API}/igdb`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body
    });
    const igdbGames = await r.json();

    if (igdbGames && igdbGames.length > 0) {
      renderResults(igdbGames, 'igdb');
      document.getElementById('manualWrap').style.display = 'block';
      btn.disabled = false; btn.textContent = 'Buscar';
      return;
    }

    // Fallback to RAWG
    setResults(`<div class="state-box"><div class="spinner"></div><div class="title">Buscando en RAWG…</div></div>`);
    const r2 = await fetch(`${API}/rawg?q=${encodeURIComponent(q)}`);
    const rawgGames = await r2.json();

    if (rawgGames && rawgGames.length > 0) {
      renderResults(rawgGames, 'rawg');
      document.getElementById('manualWrap').style.display = 'block';
    } else {
      setResults(`<div class="state-box"><div class="icon">😶</div><div class="title">Sin resultados</div><div class="sub">No encontramos "${q}" en ninguna base de datos. Puedes añadirlo manualmente.</div></div>`);
      document.getElementById('manualWrap').style.display = 'block';
    }
  } catch(e) {
    setResults(`<div class="state-box"><div class="icon">⚠️</div><div class="title">Error</div><div class="sub">${e.message}</div></div>`);
  }

  btn.disabled = false; btn.textContent = 'Buscar';
}

function renderResults(games, source) {
  const html = `
    <div class="section-label">${games.length} resultado${games.length!==1?'s':''} · ${source==='rawg'?'RAWG':'IGDB'}</div>
    ${games.map(g => {
      const isRawg = g.source === 'rawg';
      const cover = g.cover ? (isRawg ? g.cover.url : g.cover.url.replace('t_thumb','t_cover_big')) : null;
      const year = g.first_release_date ? new Date(g.first_release_date*1000).getFullYear() : null;
      return `
        <div class="game-card" onclick='seleccionarJuego(${JSON.stringify(g).replace(/'/g,"&#39;")})'>
          ${cover ? `<img class="game-cover" src="${cover}" alt="${g.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="game-cover-placeholder" ${cover ? 'style="display:none"' : ''}>🎮</div>
          <div class="game-info">
            <div class="game-name">${g.name}</div>
            <div class="game-meta">
              ${year ? `<span class="badge year">${year}</span>` : ''}
              ${g.platforms ? g.platforms.slice(0,3).map(p => `<span class="badge platform">${mapPlatform(p.name)}</span>`).join('') : '<span class="badge">—</span>'}
            </div>
            <button class="btn-select">Seleccionar →</button>
          </div>
        </div>
      `;
    }).join('')}
  `;
  setResults(html);
}

function mapPlatform(name) {
  if (name.includes('PlayStation 5')) return 'PS5';
  if (name.includes('PlayStation 4')) return 'PS4';
  if (name.includes('Switch')) return 'Switch';
  if (name.includes('PC') || name.includes('Windows')) return 'PC';
  if (name.includes('Xbox Series')) return 'Xbox Series';
  if (name.includes('Xbox One')) return 'Xbox One';
  return name.length > 12 ? name.substring(0,12)+'…' : name;
}

function igdbPlatformToCategory(platforms) {
  if (!platforms) return 'PS5';
  const names = platforms.map(p => p.name.toLowerCase());
  if (names.some(n => n.includes('playstation 5'))) return 'PS5';
  if (names.some(n => n.includes('playstation 4'))) return 'PS4';
  if (names.some(n => n.includes('switch'))) return 'Switch';
  if (names.some(n => n.includes('pc') || n.includes('windows'))) return 'PC';
  return 'PS5';
}

function generateSku(cat) {
  const prefix = { 'PS5':'PS5','PS4':'PS4','Switch':'SW','Switch 2':'SW2','PC':'PC','Steelbook':'SB','Cartas':'CAR','Coleccionismo':'COL','Zapatillas':'ZP','Mandos':'MND' };
  const p = prefix[cat] || 'XX';
  skuCounters[p] = (skuCounters[p] || 0) + 1;
  return `${p}-NEW${String(skuCounters[p]).padStart(3,'0')}`;
}

async function seleccionarJuego(game) {
  currentGame = game;
  const cover = game.cover ? game.cover.url.replace('t_thumb','t_cover_big') : null;
  const year = game.first_release_date ? new Date(game.first_release_date*1000).getFullYear() : null;
  const cat = igdbPlatformToCategory(game.platforms);

  const coverEl = document.getElementById('detailCover');
  coverEl.innerHTML = cover
    ? `<img class="detail-cover" src="${cover}" alt="${game.name}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder>🎮</div>'">`
    : `<div class="detail-cover-placeholder">🎮</div>`;

  document.getElementById('detailTitle').textContent = game.name;
  document.getElementById('detailMeta').innerHTML = `
    ${year ? `<span class="badge year">${year}</span>` : ''}
    <span class="badge platform">${cat}</span>
  `;
  document.getElementById('fNombre').value = game.name;
  document.getElementById('fCategoria').value = cat;
  document.getElementById('fSku').value = generateSku(cat);
  document.getElementById('fStock').value = 1;
  document.getElementById('fCoste').value = '';
  document.getElementById('fVM').value = '';
  document.getElementById('detailOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  await fetchEbayPrice(game.name, cat);
}

async function fetchEbayPrice(gameName, cat) {
  document.getElementById('priceContent').innerHTML = `<div class="price-loading"><div class="price-spinner"></div> Consultando eBay…</div>`;
  document.getElementById('priceSub').textContent = '';

  try {
    const q = encodeURIComponent(`${gameName} ${cat} PAL`);
    const r = await fetch(`${API}/ebay?q=${q}`);
    const data = await r.json();

    if (data.itemSummaries && data.itemSummaries.length > 0) {
      const prices = data.itemSummaries
        .map(i => parseFloat(i.price?.value || 0))
        .filter(p => p > 0)
        .sort((a,b) => a-b);

      if (prices.length > 0) {
        // Remove outliers (top and bottom 20%)
        const trim = Math.floor(prices.length * 0.2);
        const trimmed = prices.slice(trim, prices.length - trim || undefined);
        const avg = trimmed.reduce((a,b) => a+b, 0) / trimmed.length;
        const min = prices[0];
        const max = prices[prices.length-1];

        document.getElementById('priceContent').innerHTML = `<div class="price-value">${avg.toFixed(2)} €</div>`;
        document.getElementById('priceSub').textContent = `Rango: ${min.toFixed(0)}–${max.toFixed(0)} € · ${prices.length} resultados en eBay`;
        document.getElementById('fVM').value = avg.toFixed(2);
        return;
      }
    }

    document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">Sin datos en eBay</div>`;
    document.getElementById('priceSub').textContent = 'Introduce el valor manualmente';
  } catch(e) {
    document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">No disponible</div>`;
  }
}

function abrirManual() {
  currentGame = null;
  document.getElementById('detailCover').innerHTML = `<div class="detail-cover-placeholder">🎮</div>`;
  document.getElementById('detailTitle').textContent = 'Nuevo producto manual';
  document.getElementById('detailMeta').innerHTML = '';
  document.getElementById('fNombre').value = '';
  document.getElementById('fCategoria').value = 'PS5';
  document.getElementById('fSku').value = generateSku('PS5');
  document.getElementById('fStock').value = 1;
  document.getElementById('fCoste').value = '';
  document.getElementById('fVM').value = '';
  document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">Introduce el valor manualmente</div>`;
  document.getElementById('priceSub').textContent = '';
  document.getElementById('detailOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

document.getElementById('fCategoria').addEventListener('change', function() {
  document.getElementById('fSku').value = generateSku(this.value);
});

function confirmarAdd() {
  const nombre = document.getElementById('fNombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio'); return; }

  const item = {
    nombre,
    categoria: document.getElementById('fCategoria').value,
    condicion: document.getElementById('fCondicion').value,
    coste: parseFloat(document.getElementById('fCoste').value) || 0,
    vm: parseFloat(document.getElementById('fVM').value) || 0,
    stock: parseInt(document.getElementById('fStock').value) || 1,
    sku: document.getElementById('fSku').value,
    cover: currentGame?.cover?.url?.replace('t_thumb','t_cover_big') || null,
  };

  addedItems.unshift(item);
  renderAdded();
  cerrarDetalle();
  showToast(`✓ "${nombre}" añadido`);
}

function renderAdded() {
  const wrap = document.getElementById('addedWrap');
  const list = document.getElementById('addedList');
  wrap.style.display = 'block';
  list.innerHTML = addedItems.map(item => `
    <div class="added-item">
      ${item.cover
        ? `<img class="added-cover" src="${item.cover}" alt="${item.nombre}" onerror="this.style.display='none'">`
        : `<div class="added-cover" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface2);border:1px solid var(--border);border-radius:6px">🎮</div>`}
      <div>
        <div class="added-name">${item.nombre}</div>
        <div class="added-meta">${item.categoria} · ${item.condicion} · SKU: ${item.sku}</div>
      </div>
      <div class="added-price">${item.vm > 0 ? item.vm.toFixed(2)+' €' : '—'}</div>
    </div>
  `).join('');
}

function setResults(html) {
  document.getElementById('resultsWrap').innerHTML = html;
}

function cerrarDetalle(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}
</script>
