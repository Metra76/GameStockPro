<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GameStockPro – Buscador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
    --border: #2a2f3d; --accent: #6c63ff; --gold: #f5c842;
    --text: #e8eaf0; --muted: #5a6080; --green: #3ddc84;
    --red: #ff6b6b; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 0 0 80px; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }
  .header-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .search-wrap { padding: 16px 14px 10px; max-width: 600px; margin: 0 auto; }
  .search-box { display: flex; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 4px 4px 4px 14px; align-items: center; transition: border-color .2s; }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; padding: 10px 0; }
  .search-box input::placeholder { color: var(--muted); }
  .btn-search { background: var(--accent); border: none; color: #fff; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; transition: opacity .15s; white-space: nowrap; }
  .btn-search:hover { opacity: .85; }
  .btn-search:disabled { opacity: .4; cursor: default; }

  .platform-filters { display: flex; gap: 7px; overflow-x: auto; padding: 0 14px 8px; max-width: 600px; margin: 0 auto; scrollbar-width: none; }
  .platform-filters::-webkit-scrollbar { display: none; }
  .pf-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 5px 13px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all .15s; flex-shrink: 0; }
  .pf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .results-wrap { padding: 12px 14px; max-width: 600px; margin: 0 auto; }
  .section-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .15s; margin-bottom: 8px; position: relative; overflow: hidden; }
  .game-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity .15s; }
  .game-card:hover { border-color: var(--accent); background: var(--surface2); }
  .game-card:hover::before { opacity: 1; }
  .game-icon { width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .game-info { flex: 1; min-width: 0; }
  .game-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; line-height: 1.3; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .badge.platform { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,.1); }
  .badge.year { color: var(--gold); border-color: var(--gold); background: rgba(245,200,66,.08); }
  .badge.source { color: var(--muted); border-color: var(--border); font-size: 9px; }
  .select-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

  .state-box { text-align: center; padding: 50px 20px; color: var(--muted); }
  .state-box .icon { font-size: 44px; margin-bottom: 14px; }
  .state-box .title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .state-box .sub { font-size: 12px; line-height: 1.6; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Detail sheet */
  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .detail-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px 48px; width: 100%; max-width: 600px; max-height: 94vh; overflow-y: auto; border: 1px solid var(--border); border-bottom: none; }
  .sheet-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; line-height: 1.3; margin-bottom: 14px; }

  /* Price panel */
  .price-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; }
  .price-panel-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .price-main { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--green); margin-bottom: 6px; }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
  .price-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; text-align: center; }
  .price-cell-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .price-cell-val { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .price-count { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .price-loading { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .price-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }

  /* Listings preview */
  .listings-wrap { margin-top: 10px; }
  .listing-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .listing-row:last-child { border-bottom: none; }
  .listing-title { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .listing-price { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); flex-shrink: 0; }
  .listing-link { font-size: 10px; color: var(--accent); text-decoration: none; flex-shrink: 0; }

  /* Form */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 10px 13px; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .15s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .btn-add { width: 100%; background: linear-gradient(135deg, var(--accent), #a78bfa); border: none; color: #fff; padding: 14px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; transition: opacity .15s; margin-top: 6px; }
  .btn-add:hover { opacity: .9; }
  .btn-cancel { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 11px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 8px; }
  .btn-manual { width: 100%; background: transparent; border: 1.5px dashed var(--border); color: var(--muted); padding: 13px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-manual:hover { border-color: var(--accent); color: var(--accent); }

  /* Added list */
  .added-section { margin-top: 20px; }
  .added-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .added-icon { width: 34px; height: 34px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .added-name { font-weight: 600; font-size: 12px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .added-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .added-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; color: var(--green); margin-left: auto; flex-shrink: 0; text-align: right; }
  .added-coste { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0d0f14; padding: 10px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 999; font-family: 'Syne', sans-serif; box-shadow: 0 4px 20px rgba(61,220,132,.3); animation: fadeInOut 2.6s forwards; white-space: nowrap; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-8px)} 10%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎮</div>
  <div>
    <div class="header-title">GameStockPro</div>
    <div class="header-sub">Buscador · IGDB · RAWG · GiantBomb · eBay</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Nombre del juego…" autocomplete="off" />
    <button class="btn-search" id="searchBtn" onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="platform-filters">
  <button class="pf-btn active" onclick="setPlatform(null,this)">Todos</button>
  <button class="pf-btn" onclick="setPlatform('PS5',this)">PS5</button>
  <button class="pf-btn" onclick="setPlatform('PS4',this)">PS4</button>
  <button class="pf-btn" onclick="setPlatform('Switch',this)">Switch</button>
  <button class="pf-btn" onclick="setPlatform('PC',this)">PC</button>
  <button class="pf-btn" onclick="setPlatform('Xbox',this)">Xbox</button>
</div>

<div class="results-wrap" id="resultsWrap">
  <div class="state-box">
    <div class="icon">🔍</div>
    <div class="title">Busca un juego</div>
    <div class="sub">Nombre, plataforma, año y precio real de eBay basado en ventas activas.</div>
  </div>
</div>

<div class="results-wrap" id="addedWrap" style="display:none">
  <div class="added-section">
    <div class="section-label">✓ Añadidos esta sesión</div>
    <div id="addedList"></div>
  </div>
</div>

<div class="results-wrap" id="manualWrap" style="display:none">
  <button class="btn-manual" onclick="abrirManual()">＋ Añadir manualmente</button>
</div>

<!-- Detail sheet -->
<div class="detail-overlay" id="detailOverlay" style="display:none" onclick="cerrarDetalle(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="detailTitle"></div>
    <div class="game-meta" id="detailMeta" style="margin-bottom:14px"></div>

    <div class="price-panel">
      <div class="price-panel-label">💰 Precio mercado eBay</div>
      <div id="priceContent"><div class="price-loading"><div class="price-spinner"></div>Consultando eBay…</div></div>
    </div>

    <div class="field">
      <label>Nombre</label>
      <input type="text" id="fNombre" />
    </div>
    <div class="field">
      <label>Edición (opcional)</label>
      <input type="text" id="fEdicion" placeholder="Collector's Edition, Deluxe, Limited…" />
    </div>
    <div class="grid2">
      <div class="field">
        <label>Categoría</label>
        <select id="fCategoria">
          <option>PS5</option><option>PS4</option><option>Switch</option>
          <option>Switch 2</option><option>PC</option><option>Steelbook</option>
          <option>Cartas</option><option>Coleccionismo</option><option>Zapatillas</option><option>Mandos</option>
        </select>
      </div>
      <div class="field">
        <label>Condición</label>
        <select id="fCondicion">
          <option>Precintado</option><option>CIB</option><option>Loose</option>
        </select>
      </div>
    </div>
    <div class="grid3">
      <div class="field">
        <label>Coste (€)</label>
        <input type="number" id="fCoste" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>Val. mercado (€)</label>
        <input type="number" id="fVM" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>Stock</label>
        <input type="number" id="fStock" value="1" min="1" />
      </div>
    </div>
    <div class="field">
      <label>SKU</label>
      <input type="text" id="fSku" readonly style="opacity:.4" />
    </div>

    <button class="btn-add" onclick="confirmarAdd()">＋ Añadir al inventario</button>
    <button class="btn-cancel" onclick="cerrarDetalle()">Cancelar</button>
  </div>
</div>

<script>
const API = 'https://gamestockpro-api.supremasos.workers.dev';
let selectedPlatform = null;
let currentGame = null;
let addedItems = [];
let skuCounters = {};

function setPlatform(p, btn) {
  selectedPlatform = p;
  document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

async function buscar() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '…';
  setResults(`<div class="state-box"><div class="spinner"></div><div class="title">Buscando en IGDB · RAWG · GiantBomb…</div></div>`);

  try {
    const params = new URLSearchParams({ q });
    if (selectedPlatform) params.set('platform', selectedPlatform);
    const r = await fetch(`${API}/search?${params}`);
    const games = await r.json();

    if (games && games.length > 0) {
      renderResults(games);
      document.getElementById('manualWrap').style.display = 'block';
    } else {
      setResults(`<div class="state-box"><div class="icon">😶</div><div class="title">Sin resultados</div><div class="sub">No encontramos "${q}". Prueba con el nombre en inglés o añádelo manualmente.</div></div>`);
      document.getElementById('manualWrap').style.display = 'block';
    }
  } catch(e) {
    setResults(`<div class="state-box"><div class="icon">⚠️</div><div class="title">Error de conexión</div><div class="sub">${e.message}</div></div>`);
  }
  btn.disabled = false; btn.textContent = 'Buscar';
}

function platformEmoji(cat) {
  const map = { 'PS5':'🎮','PS4':'🎮','Switch':'🔴','PC':'💻','Xbox':'🟩' };
  return map[cat] || '🎮';
}

function renderResults(games) {
  const html = `
    <div class="section-label">${games.length} resultado${games.length!==1?'s':''} encontrado${games.length!==1?'s':''}</div>
    ${games.map(g => {
      const year = g.first_release_date ? new Date(g.first_release_date*1000).getFullYear() : null;
      const plats = g.platforms ? [...new Set(g.platforms.slice(0,4).map(p => p.name))].filter(Boolean) : [];
      const srcColor = g.source === 'igdb' ? '#6c63ff' : g.source === 'rawg' ? '#3ddc84' : '#f5c842';
      return `
        <div class="game-card" onclick='seleccionarJuego(${JSON.stringify(g).replace(/'/g,"&#39;")})'>
          <div class="game-icon">${platformEmoji(plats[0])}</div>
          <div class="game-info">
            <div class="game-name" title="${g.name}">${g.name}</div>
            <div class="game-meta">
              ${year ? `<span class="badge year">${year}</span>` : ''}
              ${plats.slice(0,3).map(p => `<span class="badge platform">${p}</span>`).join('')}
              <span class="badge source" style="border-color:${srcColor};color:${srcColor}">${g.source.toUpperCase()}</span>
            </div>
          </div>
          <span class="select-arrow">›</span>
        </div>
      `;
    }).join('')}
  `;
  setResults(html);
}

function igdbPlatformToCategory(platforms) {
  if (!platforms || platforms.length === 0) return 'PS5';
  const names = platforms.map(p => p.name.toLowerCase());
  if (names.some(n => n.includes('ps5') || n.includes('playstation 5'))) return 'PS5';
  if (names.some(n => n.includes('ps4') || n.includes('playstation 4'))) return 'PS4';
  if (names.some(n => n.includes('switch'))) return 'Switch';
  if (names.some(n => n.includes('pc') || n.includes('windows'))) return 'PC';
  if (names.some(n => n.includes('xbox'))) return 'PS5';
  return 'PS5';
}

function generateSku(cat) {
  const prefix = { 'PS5':'PS5','PS4':'PS4','Switch':'SW','Switch 2':'SW2','PC':'PC','Steelbook':'SB','Cartas':'CAR','Coleccionismo':'COL','Zapatillas':'ZP','Mandos':'MND' };
  const p = prefix[cat] || 'XX';
  skuCounters[p] = (skuCounters[p] || 0) + 1;
  return `${p}-NEW${String(skuCounters[p]).padStart(3,'0')}`;
}

async function seleccionarJuego(game) {
  currentGame = game;
  const year = game.first_release_date ? new Date(game.first_release_date*1000).getFullYear() : null;
  const cat = selectedPlatform || igdbPlatformToCategory(game.platforms);

  document.getElementById('detailTitle').textContent = game.name;
  const plats = game.platforms ? [...new Set(game.platforms.slice(0,4).map(p => p.name))].filter(Boolean) : [];
  document.getElementById('detailMeta').innerHTML = `
    ${year ? `<span class="badge year">${year}</span>` : ''}
    ${plats.slice(0,3).map(p => `<span class="badge platform">${p}</span>`).join('')}
  `;

  document.getElementById('fNombre').value = game.name;
  document.getElementById('fEdicion').value = '';
  document.getElementById('fCategoria').value = cat;
  document.getElementById('fSku').value = generateSku(cat);
  document.getElementById('fStock').value = 1;
  document.getElementById('fCoste').value = '';
  document.getElementById('fVM').value = '';
  document.getElementById('detailOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  await fetchPrice(game.name, cat);
}

async function fetchPrice(gameName, cat) {
  document.getElementById('priceContent').innerHTML = `<div class="price-loading"><div class="price-spinner"></div>Consultando eBay…</div>`;

  try {
    const r = await fetch(`${API}/price?q=${encodeURIComponent(gameName)}&cat=${encodeURIComponent(cat)}`);
    const data = await r.json();

    if (!data.found) {
      document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">Sin datos en eBay — introduce el valor manualmente</div>`;
      return;
    }

    const recSuffix = data.avg > data.median * 1.15 ? ' ↑' : data.avg < data.median * 0.85 ? ' ↓' : '';
    document.getElementById('priceContent').innerHTML = `
      <div class="price-main">${data.median.toFixed(2)} €<span style="font-size:14px;color:var(--muted);font-weight:400"> mediana${recSuffix}</span></div>
      <div class="price-grid">
        <div class="price-cell"><div class="price-cell-label">Media</div><div class="price-cell-val">${data.avg.toFixed(2)} €</div></div>
        <div class="price-cell"><div class="price-cell-label">Mínimo</div><div class="price-cell-val" style="color:var(--green)">${data.min.toFixed(2)} €</div></div>
        <div class="price-cell"><div class="price-cell-label">Máximo</div><div class="price-cell-val" style="color:var(--red)">${data.max.toFixed(2)} €</div></div>
      </div>
      <div class="price-count">📊 ${data.count} listados activos en eBay</div>
      ${data.listings && data.listings.length > 0 ? `
        <div class="listings-wrap">
          ${data.listings.map(l => `
            <div class="listing-row">
              <div class="listing-title" title="${l.title}">${l.title}</div>
              <div class="listing-price">${l.price.toFixed(2)} €</div>
              <a class="listing-link" href="${l.url}" target="_blank" rel="noopener">Ver →</a>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
    document.getElementById('fVM').value = data.median.toFixed(2);
  } catch(e) {
    document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">Error al consultar eBay</div>`;
  }
}

function abrirManual() {
  currentGame = null;
  document.getElementById('detailTitle').textContent = 'Añadir manualmente';
  document.getElementById('detailMeta').innerHTML = '';
  document.getElementById('fNombre').value = '';
  document.getElementById('fEdicion').value = '';
  document.getElementById('fCategoria').value = 'PS5';
  document.getElementById('fSku').value = generateSku('PS5');
  document.getElementById('fStock').value = 1;
  document.getElementById('fCoste').value = '';
  document.getElementById('fVM').value = '';
  document.getElementById('priceContent').innerHTML = `<div style="color:var(--muted);font-size:13px">Introduce el valor manualmente</div>`;
  document.getElementById('detailOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

document.getElementById('fCategoria').addEventListener('change', function() {
  document.getElementById('fSku').value = generateSku(this.value);
});

function confirmarAdd() {
  const nombre = document.getElementById('fNombre').value.trim();
  const edicion = document.getElementById('fEdicion').value.trim();
  if (!nombre) { alert('El nombre es obligatorio'); return; }

  const nombreCompleto = edicion ? `${nombre} – ${edicion}` : nombre;

  const item = {
    nombre: nombreCompleto,
    categoria: document.getElementById('fCategoria').value,
    condicion: document.getElementById('fCondicion').value,
    coste: parseFloat(document.getElementById('fCoste').value) || 0,
    vm: parseFloat(document.getElementById('fVM').value) || 0,
    stock: parseInt(document.getElementById('fStock').value) || 1,
    sku: document.getElementById('fSku').value,
  };

  addedItems.unshift(item);
  renderAdded();
  cerrarDetalle();
  showToast(`✓ "${nombreCompleto}" añadido`);
}

function renderAdded() {
  document.getElementById('addedWrap').style.display = 'block';
  document.getElementById('addedList').innerHTML = addedItems.map(item => `
    <div class="added-item">
      <div class="added-icon">${platformEmoji(item.categoria)}</div>
      <div style="flex:1;min-width:0">
        <div class="added-name">${item.nombre}</div>
        <div class="added-meta">${item.categoria} · ${item.condicion} · SKU: ${item.sku}</div>
      </div>
      <div class="added-price">
        ${item.vm > 0 ? item.vm.toFixed(2)+' €' : '—'}
        ${item.coste > 0 ? `<div class="added-coste">Coste: ${item.coste.toFixed(2)} €</div>` : ''}
      </div>
    </div>
  `).join('');
}

function setResults(html) { document.getElementById('resultsWrap').innerHTML = html; }

function cerrarDetalle(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}
</script>
</body>
</html>
