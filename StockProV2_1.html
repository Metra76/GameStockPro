function reducer(state, action) {
  switch (action.type) {
    case "ADD_PRODUCT":
      return {
        ...state,
        products: [...state.products, {
          ...action.payload,
          id: Date.now()
        }]
      };
    case "UPDATE_PRODUCT":
      return {
        ...state,
        products: state.products.map(p => p.id === action.payload.id ? action.payload : p)
      };
    case "DELETE_PRODUCT":
      return {
        ...state,
        products: state.products.filter(p => p.id !== action.payload)
      };
    case "ADD_MOVEMENT":
      {
        const {
          productoId,
          tipo,
          cantidad
        } = action.payload;
        const products = state.products.map(p => {
          if (p.id === productoId) {
            const delta = tipo === "Venta" || tipo === "Salida" ? -cantidad : cantidad;
            return {
              ...p,
              stock: Math.max(0, p.stock + delta)
            };
          }
          return p;
        });
        return {
          ...state,
          products,
          movements: [{
            ...action.payload,
            id: Date.now()
          }, ...state.movements]
        };
      }
    case "ADD_RESERVA":
      return {
        ...state,
        reservas: [...state.reservas, {
          ...action.payload,
          id: Date.now()
        }]
      };
    case "UPDATE_RESERVA":
      return {
        ...state,
        reservas: state.reservas.map(r => r.id === action.payload.id ? action.payload : r)
      };
    case "DELETE_RESERVA":
      return {
        ...state,
        reservas: state.reservas.filter(r => r.id !== action.payload)
      };
    default:
      return state;
  }
}
